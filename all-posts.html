<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects | CRONZPH</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all-posts.css">
    <style>
        /* Multiple category badges */
        .post-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-bottom: 0.5rem;
        }

        /* Modal category area — flex wrap for multiple badges */
        #modalCategory {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-top: 0.4rem;
        }

        /* Description preserves formatting */
        #modalDescription {
            white-space: pre-line;
            line-height: 1.75;
            color: var(--text-secondary, #94a3b8);
            font-size: 1rem;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h2>CRONZPH</h2>
            </div>
            <div class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#portfolio">Portfolio</a>
                <a href="index.html#about">About</a>
                <a href="index.html#contact">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title">All Projects</h1>
            <p class="page-subtitle">Browse through all my creative work and projects</p>
        </div>
    </section>

    <!-- Search and Filter Section -->
    <section class="filter-section">
        <div class="container">
            <div class="search-filter-wrapper">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Search projects by title or description...">
                </div>
                <div class="filter-controls">
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="Web Development">Web Development</option>
                        <option value="Mobile Development">Mobile Development</option>
                        <option value="Arduino / IoT">Arduino / IoT</option>
                        <option value="Networking">Networking</option>
                        <option value="Cyber Security">Cyber Security</option>
                        <option value="IT Support">IT Support</option>
                        <option value="AI Automation">AI Automation</option>
                        <option value="Game Development">Game Development</option>
                        <option value="Smart Systems">Smart Systems</option>
                    </select>
                    <select id="sortFilter">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="title-asc">Title (A-Z)</option>
                        <option value="title-desc">Title (Z-A)</option>
                    </select>
                    <button id="clearFilters" class="btn btn-secondary">Clear Filters</button>
                </div>
            </div>
            <div class="results-info">
                <span id="resultsCount">0 projects found</span>
            </div>
        </div>
    </section>

    <!-- Posts Grid Section -->
    <section class="all-posts-section">
        <div class="container">
            <div id="allPostsGrid" class="portfolio-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading projects...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Post Detail Modal -->
    <div id="postModal" class="post-modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle"></h2>
                    <!-- Now holds multiple <span> badges -->
                    <div id="modalCategory"></div>
                </div>
                <div id="modalBanner" class="modal-banner"></div>
                <div class="modal-body">
                    <!-- Uses innerHTML with <br> for line breaks -->
                    <p id="modalDescription"></p>
                    <div class="modal-meta">
                        <span id="modalDate"></span>
                    </div>
                    <div id="modalGallery" class="modal-gallery"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 CRONZPH. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="js/all-posts.js"></script>
</body>
</html>
