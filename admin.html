<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .firebase-status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 9999;
        }
        .firebase-status.checking {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.4);
            color: #f59e0b;
        }
        .firebase-status.connected {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #10b981;
        }
        .firebase-status.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444;
        }
        .protocol-warning {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.4);
            color: #f59e0b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>
<body>
    <div id="firebaseStatus" class="firebase-status checking">⏳ Connecting to Firebase...</div>

    <div class="login-container">
        <div class="login-card">
            <h1>Admin Login</h1>
            <p class="login-subtitle">Enter your credentials to access the admin panel</p>

            <div id="protocolWarning" class="protocol-warning">
                ⚠️ <strong>Local file detected!</strong> Firebase requires a web server to work.<br>
                Please use <strong>Live Server</strong> (VS Code extension) or run via <code>localhost</code>.
            </div>

            <div id="loginError"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Login</button>
            </form>
            <a href="index.html" class="back-link">← Back to Portfolio</a>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const statusEl = document.getElementById('firebaseStatus');
        const errorDiv = document.getElementById('loginError');
        const protocolWarning = document.getElementById('protocolWarning');

        // Check if running on file:// protocol
        if (window.location.protocol === 'file:') {
            protocolWarning.style.display = 'block';
            statusEl.className = 'firebase-status error';
            statusEl.textContent = '❌ Use Live Server or localhost';
        }

        // Timeout if Firebase doesn't respond in 8 seconds
        const connectionTimeout = setTimeout(() => {
            if (statusEl.className.includes('checking')) {
                statusEl.className = 'firebase-status error';
                statusEl.textContent = '❌ Connection timeout - check internet';
                errorDiv.innerHTML = '<div class="error">❌ Firebase connection timed out. Please check your internet connection and try again.</div>';
            }
        }, 8000);

        // Test Firebase connection
        try {
            onAuthStateChanged(auth, (user) => {
                clearTimeout(connectionTimeout);
                statusEl.className = 'firebase-status connected';
                statusEl.textContent = '✅ Firebase Connected';
                setTimeout(() => statusEl.style.display = 'none', 3000);

                if (user) {
                    window.location.href = 'dashboard.html';
                }
            }, (error) => {
                clearTimeout(connectionTimeout);
                statusEl.className = 'firebase-status error';
                statusEl.textContent = '❌ Firebase Error';
                errorDiv.innerHTML = `<div class="error">Firebase connection failed: ${error.message}</div>`;
            });
        } catch (err) {
            clearTimeout(connectionTimeout);
            statusEl.className = 'firebase-status error';
            statusEl.textContent = '❌ Firebase Failed to Load';
            errorDiv.innerHTML = `<div class="error">Failed to connect to Firebase: ${err.message}</div>`;
        }

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('loginBtn');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            errorDiv.innerHTML = '';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                errorDiv.innerHTML = '<div class="success">✅ Login successful! Redirecting...</div>';
                window.location.href = 'dashboard.html';
            } catch (error) {
                let errorMessage = 'Login failed. Please try again.';
                console.error('Firebase Auth Error:', error.code, error.message);

                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMessage = '❌ Invalid email address format.';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = '❌ This account has been disabled.';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = '❌ No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = '❌ Incorrect password. Please try again.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = '❌ Too many attempts. Please try again later.';
                        break;
                    case 'auth/invalid-credential':
                        errorMessage = '❌ Invalid credentials. Please check your email and password.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = '❌ Network error. Please check your internet connection.';
                        break;
                    default:
                        errorMessage = `❌ Error (${error.code}): ${error.message}`;
                }

                errorDiv.innerHTML = `<div class="error">${errorMessage}</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
