<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .analytics-stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
        }

        .analytics-stat-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-4px);
        }

        .analytics-stat-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .analytics-stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .analytics-stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .post-analytics-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .post-analytics-item {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .post-analytics-item:hover {
            border-color: var(--accent-primary);
            transform: translateX(4px);
        }

        .post-analytics-thumb {
            width: 80px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .post-analytics-thumb-placeholder {
            width: 80px;
            height: 50px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .post-analytics-info {
            flex: 1;
            min-width: 0;
        }

        .post-analytics-title {
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 0.25rem 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .post-analytics-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .post-analytics-stats {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-shrink: 0;
        }

        .post-analytics-stat {
            text-align: center;
        }

        .post-analytics-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .post-analytics-stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-tab:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
        }

        .chart-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .post-analytics-item {
                grid-template-columns: 1fr;
            }

            .post-analytics-stats {
                justify-content: space-around;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="adminView" class="view active">
        <div id="sidebarContainer"></div>

        <main class="main-content">
            <div class="top-bar">
                <h1>📊 Analytics</h1>
                <div class="top-bar-actions">
                    <div class="user-info">
                        <span id="userEmail"></span>
                    </div>
                </div>
            </div>

            <div class="content-area">
                
                <!-- Overall Stats -->
                <div class="analytics-stats">
                    <div class="analytics-stat-card">
                        <div class="analytics-stat-icon">👁️</div>
                        <div class="analytics-stat-value" id="totalViews">0</div>
                        <div class="analytics-stat-label">Total Views</div>
                    </div>
                    <div class="analytics-stat-card">
                        <div class="analytics-stat-icon">📅</div>
                        <div class="analytics-stat-value" id="viewsToday">0</div>
                        <div class="analytics-stat-label">Views Today</div>
                    </div>
                    <div class="analytics-stat-card">
                        <div class="analytics-stat-icon">📊</div>
                        <div class="analytics-stat-value" id="viewsThisMonth">0</div>
                        <div class="analytics-stat-label">Views This Month</div>
                    </div>
                    <div class="analytics-stat-card">
                        <div class="analytics-stat-icon">📈</div>
                        <div class="analytics-stat-value" id="avgViewsPerPost">0</div>
                        <div class="analytics-stat-label">Avg Views/Post</div>
                    </div>
                </div>

                <!-- Views Over Time Chart -->
                <div class="card">
                    <div class="card-header">
                        <h2>Views Over Time</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="viewsTimeChart"></canvas>
                    </div>
                </div>

                <!-- Filter Tabs -->
                <div class="card">
                    <div class="card-header">
                        <h2>Post Analytics</h2>
                    </div>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-period="all" onclick="filterByPeriod('all')">All Time</button>
                        <button class="filter-tab" data-period="today" onclick="filterByPeriod('today')">Today</button>
                        <button class="filter-tab" data-period="week" onclick="filterByPeriod('week')">This Week</button>
                        <button class="filter-tab" data-period="month" onclick="filterByPeriod('month')">This Month</button>
                        <button class="filter-tab" data-period="year" onclick="filterByPeriod('year')">This Year</button>
                        <button class="filter-tab" data-period="custom" onclick="filterByPeriod('custom')">📅 Custom Range</button>
                    </div>
                    
                    <!-- Custom Date Range Picker -->
                    <div id="dateRangePicker" style="display:none;margin-top:1rem;padding:1rem;background:var(--bg-tertiary);border-radius:8px;border:1px solid var(--border-color);">
                        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:1rem;align-items:end;">
                            <div>
                                <label style="display:block;font-size:0.875rem;color:var(--text-secondary);margin-bottom:0.5rem;font-weight:600;">From Date</label>
                                <input type="date" id="startDate" style="width:100%;padding:0.75rem;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:0.875rem;">
                            </div>
                            <div>
                                <label style="display:block;font-size:0.875rem;color:var(--text-secondary);margin-bottom:0.5rem;font-weight:600;">To Date</label>
                                <input type="date" id="endDate" style="width:100%;padding:0.75rem;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:0.875rem;">
                            </div>
                            <button class="btn btn-primary" onclick="applyCustomRange()" style="padding:0.75rem 1.5rem;white-space:nowrap;">Apply Filter</button>
                        </div>
                    </div>
                    
                    <!-- Posts List -->
                    <div id="postAnalyticsList" class="post-analytics-list">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading analytics...</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script type="module" src="js/admin-analytics.js"></script>
</body>
</html>
