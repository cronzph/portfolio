<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts | Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* ── Tab Navigation ────────────────────────────────── */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border-color, rgba(255,255,255,0.1));
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary, #94a3b8);
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--text-primary, #f0f0f0);
        }

        .tab-btn.active {
            color: var(--accent-primary, #4f9eff);
            border-bottom-color: var(--accent-primary, #4f9eff);
        }

        .tab-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 99px;
            min-width: 20px;
            text-align: center;
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary, #94a3b8);
            border: 1px solid rgba(255,255,255,0.1);
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .tab-btn.active .tab-badge {
            background: rgba(79,158,255,0.15);
            color: #4f9eff;
            border-color: rgba(79,158,255,0.25);
        }

        /* ── Tab Panels ────────────────────────────────────── */
        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
            animation: tabFadeIn 0.2s ease;
        }

        @keyframes tabFadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Category checkboxes ───────────────────────────── */
        .cat-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .cat-checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .cat-checkbox-label:hover {
            border-color: var(--accent-primary, #4f9eff);
            color: var(--text-primary);
        }
        .cat-checkbox-label input[type="checkbox"] {
            accent-color: var(--accent-primary, #4f9eff);
            width: 15px; height: 15px;
            flex-shrink: 0;
        }
        .cat-checkbox-label:has(input:checked) {
            border-color: var(--accent-primary, #4f9eff);
            background: rgba(79, 158, 255, 0.08);
            color: var(--text-primary);
        }

        /* ── Highlight manager ─────────────────────────────── */
        #highlightManager {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }

        /* ── Banner Crop Editor ────────────────────────────── */
        .banner-crop-wrapper {
            margin-top: 1rem;
            border: 1px solid var(--border-color, rgba(255,255,255,0.1));
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-secondary, #111);
        }
        .banner-crop-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 1rem;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.07));
            flex-wrap: wrap;
        }
        .banner-crop-title { font-weight: 600; font-size: 0.85rem; color: var(--text-primary, #f0f0f0); }
        .banner-crop-hint  { font-size: 0.75rem; color: var(--text-secondary, #888); flex: 1; }
        .banner-crop-remove {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            font-size: 0.78rem; font-weight: 600;
            padding: 0.3rem 0.75rem;
            border-radius: 6px; cursor: pointer;
            transition: background 0.2s; white-space: nowrap;
        }
        .banner-crop-remove:hover { background: rgba(239,68,68,0.2); }
        .banner-crop-viewport {
            position: relative; width: 100%; aspect-ratio: 16/9;
            overflow: hidden; background: #000; cursor: grab; user-select: none;
        }
        .banner-crop-viewport:active { cursor: grabbing; }
        .banner-crop-viewport img {
            position: absolute; top:0; left:0; width:100%; height:100%;
            object-fit: cover; pointer-events: none;
        }
        .banner-crop-overlay {
            position: absolute; inset: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 33.333% 33.333%;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 0.6rem;
        }
        .banner-crop-drag-hint {
            font-size: 0.7rem; color: rgba(255,255,255,0.45);
            background: rgba(0,0,0,0.45); padding: 0.2rem 0.6rem;
            border-radius: 99px; backdrop-filter: blur(4px);
        }
        .banner-crop-controls {
            padding: 0.9rem 1rem 1rem; display: flex; flex-direction: column; gap: 0.6rem;
            border-top: 1px solid var(--border-color, rgba(255,255,255,0.07));
        }
        .banner-crop-control-row { display: flex; flex-direction: column; gap: 0.3rem; }
        .banner-crop-label {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; color: var(--text-secondary, #888); font-weight: 500;
        }
        .banner-crop-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 4px; border-radius: 99px;
            background: rgba(255,255,255,0.1); outline: none; cursor: pointer;
            accent-color: var(--accent-primary, #4f9eff);
        }
        .banner-crop-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: var(--accent-primary, #4f9eff); cursor: pointer;
            box-shadow: 0 0 0 3px rgba(79,158,255,0.2);
        }
        .banner-crop-slider::-moz-range-thumb {
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--accent-primary, #4f9eff); cursor: pointer; border: none;
        }
        .banner-crop-reset {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color, rgba(255,255,255,0.1));
            color: var(--text-secondary, #888);
            font-size: 0.78rem; font-weight: 600;
            padding: 0.3rem 0.85rem; border-radius: 6px; cursor: pointer; margin-top: 0.2rem;
            transition: all 0.2s;
        }
        .banner-crop-reset:hover { background: rgba(255,255,255,0.1); color: var(--text-primary, #f0f0f0); }

        /* ── Post list description — truncate to 2 lines ───── */
        .post-list-description {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Posts Grid ────────────────────────────────────── */
        #adminPostsList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
            padding: 1rem 0 0.5rem;
        }
        .post-grid-card {
            background: var(--bg-secondary, #1a1a2e);
            border: 1px solid var(--border-color, rgba(255,255,255,0.08));
            border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .post-grid-card:hover {
            transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.3);
            border-color: rgba(79,158,255,0.3);
        }
        .pgc-banner {
            position: relative; width: 100%; aspect-ratio: 16/9;
            overflow: hidden; background: rgba(255,255,255,0.04); flex-shrink: 0;
        }
        .pgc-banner img { width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.3s ease; }
        .post-grid-card:hover .pgc-banner img { transform: scale(1.04); }
        .pgc-banner-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:2.5rem; opacity:0.3; }
        .pgc-image-badge {
            position:absolute; bottom:0.5rem; right:0.5rem;
            font-size:0.7rem; font-weight:600; background:rgba(0,0,0,0.65);
            color:rgba(255,255,255,0.85); padding:0.15rem 0.5rem; border-radius:99px;
            backdrop-filter:blur(4px); pointer-events:none;
        }
        .pgc-body { padding:0.9rem 1rem 0.6rem; flex:1; display:flex; flex-direction:column; gap:0.4rem; min-height:0; }
        .pgc-cats { display:flex; flex-wrap:wrap; gap:0.3rem; }
        .post-list-category {
            font-size:0.68rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
            padding:0.15rem 0.55rem; border-radius:99px;
            background:rgba(79,158,255,0.12); color:#4f9eff; border:1px solid rgba(79,158,255,0.25); white-space:nowrap;
        }
        .pgc-title {
            font-size:0.95rem; font-weight:700; color:var(--text-primary,#f0f0f0); margin:0; line-height:1.35;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
        }
        .pgc-desc {
            font-size:0.8rem; color:var(--text-secondary,#94a3b8); line-height:1.55; margin:0;
            display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; flex:1;
        }
        .pgc-meta { font-size:0.72rem; color:var(--text-secondary,#94a3b8); opacity:0.6; margin-top:0.2rem; }
        .pgc-actions {
            display:flex; gap:0.5rem; padding:0.65rem 1rem 0.8rem;
            border-top:1px solid var(--border-color,rgba(255,255,255,0.06));
        }
        .pgc-actions .btn { flex:1; text-align:center; font-size:0.78rem; padding:0.4rem 0.3rem; }
        #adminPostsList .empty-state { grid-column: 1 / -1; }
        #adminPostsList .loading     { grid-column: 1 / -1; }

        /* ── Large Screen Optimizations ────────────────── */
        @media (min-width: 1400px) {
            #adminPostsList {
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 1.5rem;
            }
            
            .search-filter-container {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 1rem;
                align-items: start;
            }
            
            .filter-controls {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 0.75rem;
            }
            
            #highlightManager {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
                max-width: 1400px;
            }
            
            .cat-checkbox-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }
        
        @media (min-width: 1800px) {
            #adminPostsList {
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
                gap: 1.75rem;
            }
            
            #highlightManager {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
                max-width: 1600px;
            }
            
            .cat-checkbox-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            
            .banner-crop-viewport {
                max-width: 1000px;
                margin: 0 auto;
            }
        }

        @media (max-width: 640px) {
            #adminPostsList { grid-template-columns: 1fr; }
            .tab-btn { padding: 0.65rem 1rem; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <div id="adminView" class="view active">
        <div id="sidebarContainer"></div>

        <main class="main-content">
            <div class="top-bar">
                <h1>Posts</h1>
                <div class="top-bar-actions">
                    <button class="btn btn-primary" onclick="openAddPostModal()">➕ Add New Post</button>
                    <div class="user-info"><span id="userEmail"></span></div>
                </div>
            </div>

            <div class="content-area">

                <!-- ── TAB NAVIGATION ─────────────────────────── -->
                <div class="tab-nav">
                    <button class="tab-btn active" id="tab-posts-btn" onclick="switchTab('posts')">
                        📋 Manage Posts
                        <span class="tab-badge" id="postCount">0</span>
                    </button>
                    <button class="tab-btn" id="tab-highlights-btn" onclick="switchTab('highlights')">
                        🌟 Project Highlights
                        <span class="tab-badge" id="highlightCount">0</span>
                    </button>
                </div>

                <!-- ── TAB PANEL: MANAGE POSTS ────────────────── -->
                <div class="tab-panel active" id="tab-posts">

                    <!-- Search and Filter -->
                    <div class="card" style="margin-bottom: 1.5rem;">
                        <div class="search-filter-container">
                            <div class="search-box">
                                <input type="text" id="searchInput" placeholder="🔍 Search posts by title or description..."
                                    style="width:100%;padding:0.75rem 1rem;border:1px solid var(--border-color);border-radius:8px;font-size:1rem;">
                            </div>
                            <div class="filter-controls">
                                <select id="categoryFilter" style="padding:0.75rem 1rem;border:1px solid var(--border-color);border-radius:8px;font-size:1rem;cursor:pointer;">
                                    <option value="">All Categories</option>
                                    <option value="Web Development">Web Development</option>
                                    <option value="Mobile Development">Mobile Development</option>
                                    <option value="Arduino / IoT">Arduino / IoT</option>
                                    <option value="Networking">Networking</option>
                                    <option value="Cyber Security">Cyber Security</option>
                                    <option value="IT Support">IT Support</option>
                                    <option value="AI Automation">AI Automation</option>
                                    <option value="Game Development">Game Development</option>
                                    <option value="Smart Systems">Smart Systems</option>
                                </select>
                                <select id="sortFilter" style="padding:0.75rem 1rem;border:1px solid var(--border-color);border-radius:8px;font-size:1rem;cursor:pointer;">
                                    <option value="newest">Newest First</option>
                                    <option value="oldest">Oldest First</option>
                                    <option value="title-asc">Title (A-Z)</option>
                                    <option value="title-desc">Title (Z-A)</option>
                                </select>
                                <button id="clearFilters" class="btn btn-secondary" style="padding:0.75rem 1.5rem;">Clear Filters</button>
                            </div>
                        </div>
                    </div>

                    <!-- Posts List -->
                    <div class="card">
                        <div id="adminPostsList">
                            <div class="loading">
                                <div class="spinner"></div>
                                <p>Loading posts...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── TAB PANEL: PROJECT HIGHLIGHTS ──────────── -->
                <div class="tab-panel" id="tab-highlights">
                    <div class="card">
                        <div class="card-header">
                            <h2>🌟 Project Highlights</h2>
                        </div>
                        <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:1rem;">
                            Choose which project is featured per category on your homepage.
                        </p>
                        <div id="highlightManager">
                            <p style="color:var(--text-secondary);">Loading...</p>
                        </div>
                    </div>
                </div>

            </div><!-- /.content-area -->
        </main>
    </div>

    <!-- Post Preview Modal -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" onclick="closePostModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalImage" class="modal-image"></div>
                <div class="modal-info">
                    <span class="modal-category" id="modalCategory"></span>
                    <span class="modal-date" id="modalDate"></span>
                </div>
                <p id="modalDescription" class="modal-description"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="editPostFromModal()">✏️ Edit</button>
                <button class="btn btn-danger" onclick="deletePostFromModal()">🗑️ Delete</button>
                <button class="btn btn-secondary" onclick="closePostModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Add / Edit Post Modal -->
    <div id="addPostModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>Add New Post</h2>
                <button class="modal-close" onclick="closeAddPostModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="formMessage"></div>
                <form id="postForm">
                    <div class="form-row">
                        <div class="form-group" style="flex:1;">
                            <label for="postTitle">Title *</label>
                            <input type="text" id="postTitle" placeholder="Enter post title" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Category *
                            <span style="font-weight:400;color:var(--text-secondary);font-size:0.8rem;">(Select one or more)</span>
                        </label>
                        <div id="categoryCheckboxes" class="cat-checkbox-grid"></div>
                    </div>

                    <div class="form-group">
                        <label for="postDescription">Description *</label>
                        <textarea id="postDescription" placeholder="Enter post description" required></textarea>
                    </div>

                    <!-- Banner Image -->
                    <div class="form-group">
                        <label>Preview Banner Image * (1 image, 1MB max)</label>
                        <div class="file-upload" onclick="document.getElementById('bannerInput').click()">
                            <div class="upload-icon">🖼️</div>
                            <p>Click to upload banner image</p>
                            <p class="upload-hint">Drag to reposition and zoom after uploading</p>
                            <input type="file" id="bannerInput" accept="image/*">
                        </div>
                        <div id="bannerPreview"></div>
                    </div>

                    <!-- Gallery Images -->
                    <div class="form-group">
                        <label>Gallery Images (Optional — Max 5 images, 1MB each)</label>
                        <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                            <div class="upload-icon">📷</div>
                            <p>Click to upload gallery images</p>
                            <p class="upload-hint">PNG, JPG, GIF up to 1MB</p>
                            <input type="file" id="fileInput" accept="image/*" multiple>
                        </div>
                        <div id="imagePreviews" class="image-previews"></div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeAddPostModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <span id="submitBtnText">Create Post</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ── TAB SWITCHER (plain JS, runs before module) ───────
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            const tabBtn = document.getElementById('tab-' + tab + '-btn');
            const tabPanel = document.getElementById('tab-' + tab);
            if (tabBtn) tabBtn.classList.add('active');
            if (tabPanel) tabPanel.classList.add('active');
        }
        // Make globally available for onclick handlers
        window.switchTab = switchTab;
    </script>
    <script src="js/theme-manager.js"></script>
    <script type="module" src="js/admin-posts.js"></script>
</body>
</html>
